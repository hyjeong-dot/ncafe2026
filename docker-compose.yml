services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hyjeong-ncafe-backend
    ports:
      - "8034:8034"
    volumes:
      - /home/hyjeong/dist/ncafe2026/backend/upload:/app/upload
    environment:
      - TZ=Asia/Seoul
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ncafedb?useSSL=false
      - SPRING_DATASOURCE_USERNAME=ncafe
      - SPRING_DATASOURCE_PASSWORD=1111
      - SERVER_PORT=8034
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hyjeong-ncafe-frontend
    ports:
      - "3034:3034"
    environment:
      - NODE_ENV=production
      - API_URL=http://hyjeong-ncafe-backend:8034
      - API_BASE_URL=http://hyjeong-ncafe-backend:8034
      - ENABLE_PROXY=true
      - TZ=Asia/Seoul
    volumes:
      - /home/hyjeong/dist/ncafe2026/frontend/public/images:/app/public/images
    depends_on:
      - backend
    restart: unless-stopped

  # DB 서비스 추가 (필요한 사람만 사용)
  db:
    image: postgres:17
    profiles: [ "with-db" ] # 기존처럼 with-db 프로필을 사용합니다. 이 프로필을 지정해야만 실행됨.
    container_name: ${USER_ID:-ncafe}-db
    environment:
      - POSTGRES_DB=ncafedb
      - POSTGRES_USER=ncafe
      - POSTGRES_PASSWORD=1111
      - TZ=Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - /home/hyjeong/dist/ncafe2026/db:/var/lib/postgresql/data
    restart: unless-stopped