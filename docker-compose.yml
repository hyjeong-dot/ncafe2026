services:
  backend:
    image: ${BACKEND_IMAGE:-ncafe-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${USER_ID}-backend
    # ports 제거: 외부 노출 차단 (BFF 패턴)
    volumes:
      - /home/hyjeong/dist/ncafe2026/backend/upload:/app/upload
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-ncafe}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - UPLOAD_LOCATION=file:/app/upload/
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    image: ${FRONTEND_IMAGE:-ncafe-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${USER_ID}-frontend
    ports:
      - "${FRONTEND_PORT:-3034}:${FRONTEND_PORT:-3034}" # 프론트엔드(BFF)만 외부 노출
    environment:
      # 컨테이너 네트워크 내부 통신이므로 백엔드 컨테이너의 8080 포트 사용
      - PORT=${FRONTEND_PORT:-3034}
      - API_BASE_URL=http://backend:8080
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

  # DB 서비스
  db:
    image: postgres:17
    profiles: [ "with-db" ]
    container_name: ${USER_ID}-db
    environment:
      POSTGRES_DB: ${DB_NAME:-ncafedb}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-ncafe}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # ports 제거: 외부에서 DB 접근 불가 (보안 강화)
    volumes:
      - /home/hyjeong/dist/ncafe2026/db:/var/lib/postgresql/data
    restart: unless-stopped