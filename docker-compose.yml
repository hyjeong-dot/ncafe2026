services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hyjeong-ncafe-backend
    ports:
      - "8034:8080"
    volumes:
      - /home/hyjeong/dist/ncafe2026/backend/upload:/app/upload
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hyjeong-ncafe-frontend
    ports:
      - "3034:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://hyjeong-ncafe-backend:8080
      - ENABLE_PROXY=true
      - TZ=Asia/Seoul
    depends_on:
      - backend
    restart: unless-stopped
