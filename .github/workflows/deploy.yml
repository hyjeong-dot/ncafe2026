name: CI/CD Deployment

on:
  push:
    branches: [ master ]
  workflow_dispatch: # 수동 배포 트리거

jobs:
  #build: 생략
  #test: 생략
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "COMPOSE_PROJECT_NAME='${COMPOSE_PROJECT_NAME:-hyjeong_ncafe}'" > .env
          echo "USER_ID='${USER_ID:-hyjeong}'" >> .env
          echo "FRONTEND_PORT='${FRONTEND_PORT:-3034}'" >> .env
          echo "SESSION_SECRET='${SESSION_SECRET}'" >> .env
          echo "JWT_SECRET='${JWT_SECRET}'" >> .env
          echo "DB_PASSWORD='${DB_PASSWORD}'" >> .env
          echo "SPRING_DATASOURCE_PASSWORD='${DB_PASSWORD}'" >> .env
          echo "SPRING_DATASOURCE_URL='${SPRING_DATASOURCE_URL}'" >> .env
          echo "SPRING_DATASOURCE_USERNAME='${SPRING_DATASOURCE_USERNAME:-ncafe}'" >> .env
          echo "GEMINI_API_KEY='${GEMINI_API_KEY}'" >> .env
          echo "TOSS_SECRET_KEY='${TOSS_SECRET_KEY}'" >> .env
          echo "TOSS_CLIENT_KEY='${TOSS_CLIENT_KEY}'" >> .env
          echo "TOSS_CHANNEL_KEY='${TOSS_CHANNEL_KEY}'" >> .env
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          USER_ID: ${{ vars.USER_ID }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          TOSS_CLIENT_KEY: ${{ vars.TOSS_CLIENT_KEY }}
          TOSS_CHANNEL_KEY: ${{ vars.TOSS_CHANNEL_KEY }}

      - name: Sync Upload Images
        run: |
          mkdir -p /home/hyjeong/dist/ncafe2026/backend/upload/images
          if [ -d "backend/upload/images" ] && [ "$(ls -A backend/upload/images)" ]; then
            cp -r backend/upload/images/. /home/hyjeong/dist/ncafe2026/backend/upload/images/
          fi
          chmod -R 755 /home/hyjeong/dist/ncafe2026/backend/upload/images

      - name: Build Services Sequentially
        run: |
          docker compose build backend
          docker compose build agent
          docker compose build frontend
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          docker compose ps
          sleep 15
          echo ""
          echo "=== Health Check ==="
          curl -sf --max-time 10 -o /dev/null -w "Frontend : HTTP %{http_code}\n" http://localhost:${FRONTEND_PORT:-3034} || echo "Frontend : not responding"
        env:
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}

      - name: Clean up old images
        run: docker image prune -f
