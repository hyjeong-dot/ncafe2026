# DB 연결 설정 (: 뒤의 값은 빌드 시 에러 방지를 위한 가짜 값이며, 실제 배포 시 환경 변수로 덮어씌워집니다.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dummy_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ncafe}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:dummy}}
spring.datasource.driver-class-name=org.postgresql.Driver

# 브라우저에서 접근할 URL 패턴
# spring.mvc.static-path-pattern=/**
#spring.mvc.static-path-pattern=/images/**
#실제 이미지가 저장된 물리적 경로 (마지막에 / 필수)
spring.web.resources.static-locations=${UPLOAD_LOCATION:file:./upload/}, classpath:/static/

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQL Init (Run data.sql always)
spring.sql.init.mode=never
# JWT Settings
jwt.secret=${JWT_SECRET:dummy_secret_key_at_least_32_bytes_long_for_security_compliance!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=50MB
server.tomcat.max-http-form-post-size=50MB



